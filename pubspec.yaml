name: expense_tracker
description: Personal Expense Tracker with Google Sheets Integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Google Sheets & Auth
  googleapis: ^11.4.0
  googleapis_auth: ^1.4.1
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # HTTP
  http: ^1.2.0

  # Charts
  fl_chart: ^0.66.2

  # UI & UX
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  animate_do: ^3.3.4

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Utils
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets: []
